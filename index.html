    <main>
        <section id="hero" class="hero-section">

                    <p class="hero-greeting">Hi</p>

                    <p id="hero-title" class="hero-subtitle"></p>

                        <a href="#projects" class="btn btn-secondary">How I Work</a>

                </div>
                <div class="hero-image-wrapper">

                    <div class="hero-shape hero-shape-2"></div>
                </div>
            </div>

    <script src="js/lazy-load.js" defer></script>
    <script src="js/neural-network.js" defer></script>
    <!-- Only load scroll-snap on desktop (>1024px) -->
    <script>
        if (window.innerWidth > 1024) {
            const scrollSnapScript = document.createElement('script');
            scrollSnapScript.src = 'js/scroll-snap.js';
            scrollSnapScript.defer = true;
            document.head.appendChild(scrollSnapScript);

            const scrollIndicatorScript = document.createElement('script');
            scrollIndicatorScript.src = 'js/scroll-indicator.js';
            scrollIndicatorScript.defer = true;
            document.head.appendChild(scrollIndicatorScript);
        }
    </script>
    <script src="js/data-loader.js" defer></script>
    <script src="js/main.js" defer></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
