<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Blog post">
    <title>Post - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/post-animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="post-body">
    <!-- Theme transition overlay -->
    <div class="theme-transition-overlay" id="theme-transition-overlay">
        <div class="theme-transition-circle" id="theme-transition-circle"></div>
    </div>

    <header id="header">
        <nav class="nav-container">
            <div class="nav-logo">
                <a href="index.html"><span id="nav-name">Jay</span></a>
            </div>
            <button class="mobile-menu-toggle" aria-label="Toggle menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="index.html#about" class="nav-link">About</a></li>
                <li><a href="index.html#experience" class="nav-link">Experience</a></li>
                <li><a href="index.html#projects" class="nav-link">Projects</a></li>
                <li><a href="index.html#skills" class="nav-link">Skills</a></li>
                <li><a href="index.html#education" class="nav-link">Education</a></li>
                <li><a href="blog.html" class="nav-link">Blog</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <button class="theme-toggle" aria-label="Toggle theme">
                <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </nav>
    </header>

    <main class="post-page">
        <article class="post-article">
            <div class="container-narrow">
                <div class="post-header">
                    <a href="blog.html" class="back-link">&larr; Back to Blog</a>
                    <h1 id="post-title" class="post-title"></h1>
                    <div class="post-meta">
                        <span id="post-date" class="post-date"></span>
                        <span class="post-separator">•</span>
                        <span id="post-read-time" class="post-read-time"></span>
                        <span class="post-separator">•</span>
                        <span id="post-category" class="post-category"></span>
                    </div>
                    <div id="post-tags" class="post-tags"></div>
                </div>

                <div id="post-content" class="post-content"></div>
            </div>
        </article>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; <span id="current-year"></span> <span id="footer-name"></span>. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Enable scrolling for post page immediately
        document.documentElement.style.overflow = 'auto';
        document.documentElement.style.height = 'auto';
        document.body.style.overflow = 'auto';
        document.body.style.height = 'auto';
    </script>
    <script src="js/lazy-load.js" defer></script>
    <script src="js/main.js" defer></script>
    <script>
        // Load post content
        async function loadPost() {
            const urlParams = new URLSearchParams(window.location.search);
            const postId = urlParams.get('id');

            if (!postId) {
                document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
                return;
            }

            try {
                const response = await fetch('data/blog-posts.json');
                const data = await response.json();
                const post = data.posts.find(p => p.id === postId);

                if (!post) {
                    document.getElementById('post-content').innerHTML = '<p>Post not found.</p>';
                    return;
                }

                document.title = `${post.title} - Portfolio`;
                document.getElementById('post-title').textContent = post.title;
                document.getElementById('post-date').textContent = new Date(post.date).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                document.getElementById('post-read-time').textContent = post.readTime;
                document.getElementById('post-category').textContent = post.category.replace('-', ' ').replace(/\b\w/g, l => l.toUpperCase());

                const tagsContainer = document.getElementById('post-tags');
                if (post.tags && post.tags.length > 0) {
                    tagsContainer.innerHTML = post.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
                }

                document.getElementById('post-content').innerHTML = post.content;

            } catch (error) {
                console.error('Error loading post:', error);
                document.getElementById('post-content').innerHTML = '<p>Error loading post. Please try again later.</p>';
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadPost);
        } else {
            loadPost();
        }
    </script>
</body>
</html>
