name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ---------------------------------------------------------------
      # Generate public/version.json from package.json + CI metadata.
      # The version badge on the site reads this file at runtime, so
      # every push automatically gets a fresh build number and commit.
      # ---------------------------------------------------------------
      - name: Generate version.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BUILD=${{ github.run_number }}
          SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > public/version.json <<EOF
          {
            "version": "${VERSION}",
            "build": ${BUILD},
            "sha": "${SHA}",
            "deployedAt": "${TIMESTAMP}"
          }
          EOF
          echo "Generated public/version.json:"
          cat public/version.json

      - name: Static HTML export
        run: pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
